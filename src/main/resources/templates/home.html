<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
</head>
<body>
    <h1 th:text="'Welcome, ' + ${username}">Welcome</h1>
    <p th:text="'Balance: ' + ${balance}"></p>

    <p th:if="${message}" th:text="${message}"></p>
    <p th:if="${error}" th:text="${error}"></p>
    <form th:action="@{/deposit}" th:object="${amountForm}" method="post">
        <input type="number" step="0.01" th:field="*{amount}" placeholder="Amount"/>
        <button type="submit">Deposit</button>
    </form>

    <form th:action="@{/withdraw}" th:object="${amountForm}" method="post">
        <input type="number" step="0.01" th:field="*{amount}" placeholder="Amount"/>
        <button type="submit">Withdraw</button>
    </form>

    <a th:href="@{/history}">View transaction history</a>

    <form th:action="@{/logout}" method="post">
        <button type="submit">Log out</button>
    </form>
</body>
</html>
