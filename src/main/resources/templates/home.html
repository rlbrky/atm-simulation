<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/nav :: head('Home')}"></head>

<body>
    <nav th:replace="~{fragments/nav :: navbar}"></nav>

    <div class="container">
        <h1 th:text="'Welcome, ' + ${ownerName}">Welcome</h1>
        <br/>

        <!-- args for formatDecimal -> (value, minIntegerDigits, Separator, decimal, separators) -->
        <p th:text="'Balance: $' + ${#numbers.formatDecimal(balance, 1, 'COMMA', 2, 'POINT')}"></p>

        <p class="message" th:if="${message}" th:text="${message}"></p>
        <p class="error" th:if="${error}" th:text="${error}"></p>
        <form th:action="@{/deposit}" th:object="${amountForm}" method="post">
            <input type="number" step="0.01" th:field="*{amount}" placeholder="Amount"/>
            <button type="submit">Deposit</button>
        </form>

        <form th:action="@{/withdraw}" th:object="${amountForm}" method="post">
            <input type="number" step="0.01" th:field="*{amount}" placeholder="Amount"/>
            <button type="submit">Withdraw</button>
        </form>
    </div>
</body>
</html>
