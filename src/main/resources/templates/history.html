<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>History</title>
</head>
<body>
    <p th:if="${#lists.isEmpty(transactions)}">No transactions yet.</p>
    <table>
        <tr><th>Type</th><th>Amount</th><th>Date</th></tr>
        <tr th:each="tx : ${transactions}">
            <td th:text="${tx.type}"></td>
            <td th:text="${tx.amount}"></td>
            <td th:text="${tx.timestamp}"></td>
        </tr>
    </table>
</body>
</html>
